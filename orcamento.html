<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

    <!-- SEO Otimização -->
    <title>Fedrix Controle de Pragas | Dedetização e Desentupimento</title>
    <meta name="description" content="Especialistas em dedetização, controle de pragas urbanas e desentupimento. Atendimento rápido e orçamento sem compromisso.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <!-- FontAwesome para Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 500: '#22c55e', 600: '#16a34a', 900: '#14532d' },
                        accent: '#25D366'
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .hero-bg {
            background: linear-gradient(rgba(20, 83, 45, 0.9), rgba(15, 23, 42, 0.95)),
                        url('https://images.unsplash.com/photo-1584820927498-cafe2c11866e?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
        }
        .whatsapp-pulse { animation: pulse-green 2s infinite; }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }
    </style>
</head>
<body class="bg-gray-900">

    <main class="hero-bg min-h-screen flex items-center justify-center py-12 px-4">
        <div class="max-w-3xl w-full text-center">
            
            <!-- Logo/Marca -->
            <div class="mb-10 inline-flex items-center gap-4 bg-white/5 backdrop-blur-md p-4 rounded-3xl border border-white/10 shadow-2xl">
                <div class="bg-brand-500 p-3 rounded-2xl text-white">
                    <i class="fa-solid fa-bug-slash text-4xl"></i>
                </div>
                <div class="text-left pr-4">
                    <h1 class="text-white text-3xl font-extrabold tracking-tighter leading-none">FEDRIX</h1>
                    <p class="text-brand-500 text-xs font-bold uppercase tracking-widest mt-1">Controle de Pragas</p>
                </div>
            </div>

            <!-- Título Principal -->
            <h2 class="text-5xl md:text-7xl font-black text-white mb-6 leading-tight tracking-tight">
                Ambiente Livre de <span class="text-brand-500">Pragas.</span>
            </h2>
            
            <p class="text-xl md:text-2xl text-gray-300 mb-10 max-w-2xl mx-auto font-light leading-relaxed">
                Atendimento emergencial para <strong class="text-white">Dedetização</strong> e <strong class="text-white">Desentupimento</strong>. Orçamento grátis agora mesmo.
            </p>

            <!-- Serviços Rápidos -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-12">
                <div class="bg-white/5 backdrop-blur-sm border border-white/10 p-5 rounded-2xl text-white hover:bg-white/10 transition-all">
                    <i class="fa-solid fa-vial-circle-check text-brand-500 text-2xl mb-3"></i>
                    <p class="font-bold">Dedetização</p>
                </div>
                <div class="bg-white/5 backdrop-blur-sm border border-white/10 p-5 rounded-2xl text-white hover:bg-white/10 transition-all">
                    <i class="fa-solid fa-house-shield text-brand-500 text-2xl mb-3"></i>
                    <p class="font-bold">Residencial</p>
                </div>
                <div class="bg-white/5 backdrop-blur-sm border border-white/10 p-5 rounded-2xl text-white hover:bg-white/10 transition-all">
                    <i class="fa-solid fa-faucet-drip text-brand-500 text-2xl mb-3"></i>
                    <p class="font-bold">Desentupimento</p>
                </div>
            </div>

            <!-- Botão de Ação -->
            <div class="relative group max-w-md mx-auto">
                <a href="https://wa.me/5511949251470" target="_blank" 
                   class="whatsapp-pulse flex items-center justify-center gap-4 bg-accent hover:bg-green-500 text-white py-6 px-10 rounded-full font-extrabold text-2xl transition-all transform hover:-translate-y-1 active:scale-95 shadow-2xl">
                    <i class="fa-brands fa-whatsapp text-4xl"></i>
                    ORÇAMENTO VIA WHATSAPP
                </a>
                <div class="mt-6 flex justify-center items-center gap-6 text-brand-500 font-bold text-sm uppercase tracking-tighter">
                    <span><i class="fa-solid fa-bolt mr-2"></i> Rápido</span>
                    <span><i class="fa-solid fa-shield mr-2"></i> Garantia</span>
                    <span><i class="fa-solid fa-certificate mr-2"></i> Seguro</span>
                </div>
            </div>

        </div>
    </main>

    <!-- Rodapé Minimalista -->
    <footer class="bg-gray-950 py-8 text-center border-t border-white/5">
        <p class="text-gray-500 text-sm font-medium">
            &copy; <span id="year"></span> Fedrix Controle de Pragas. Todos os direitos reservados.
        </p>
    </footer>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
